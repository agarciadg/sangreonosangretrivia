<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sangre o no sangre - Cap I</title>
    <style>
        :root {
            --bg-dark: #0f0508;
            --vino: #4a0e17;
            --burdeo: #6b1426;
            --rojo-oscuro: #8b1e2f;
            --ocre: #b87d4b;
            --terracota: #a84332;
            --gold-gradient: linear-gradient(135deg, #e5c07b 0%, #c39b50 50%, #a67c33 100%);
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f5e6d3;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.9rem;
            font-weight: 200;
            letter-spacing: 2px;
            color: #a89485;
            text-transform: uppercase;
        }

        .decks-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1000px;
        }

        .deck-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 160px;
        }

        .deck-btn span.count {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        /* Colores específicos de los mazos */
        .deck-1 { background-color: var(--vino); }
        .deck-2 { background-color: var(--burdeo); }
        .deck-3 { background-color: var(--terracota); }
        .deck-4 { background-color: var(--rojo-oscuro); }
        .deck-5 { background-color: var(--ocre); }

        .deck-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.4);
        }

        .deck-btn.active {
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            transform: scale(1.03);
        }

        .table-area {
            position: relative;
            width: 100%;
            max-width: 550px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--gold-gradient);
            color: #000;
            border-radius: 8px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(0.9) rotateY(90deg);
            opacity: 0;
            backface-visibility: hidden;
        }

        .card.show {
            transform: scale(1) rotateY(0deg);
            opacity: 1;
        }

        .card.slide-out {
            transform: translateX(150%) rotate(20deg);
            opacity: 0;
        }

        .card-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 600;
            opacity: 0.5;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
            width: 100%;
        }

        .card-text {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: -0.5px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-footer {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px;
            opacity: 0.4;
        }

        .placeholder-text {
            color: #a89485;
            font-weight: 200;
            letter-spacing: 1px;
            font-size: 1.1rem;
            text-align: center;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 600px) {
            .decks-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .deck-btn { min-width: unset; padding: 12px 10px; font-size: 0.75rem; }
            .table-area { height: 340px; }
            .card { padding: 25px; }
            .card-text { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sangre o no Sangre</h1>
        <p>Capítulo I</p>
    </header>

    <div class="decks-container" id="decksInterface">
        <button class="deck-btn deck-1" onclick="selectCategory(0)">
            Ganchos Radicales <span class="count" id="count-0">10</span>
        </button>
        <button class="deck-btn deck-2" onclick="selectCategory(1)">
            Experiencia y Miedos <span class="count" id="count-1">10</span>
        </button>
        <button class="deck-btn deck-3" onclick="selectCategory(2)">
            Psique y Cuerpo <span class="count" id="count-2">10</span>
        </button>
        <button class="deck-btn deck-4" onclick="selectCategory(3)">
            Erotismo y Deseo <span class="count" id="count-4">10</span>
        </button>
        <button class="deck-btn deck-5" onclick="selectCategory(5)">
            Comunidad y Rebelión <span class="count" id="count-5">10</span>
        </button>
    </div>

    <div class="table-area">
        <div id="placeholder" class="placeholder-text">Selecciona un mazo arriba para extraer una pregunta</div>
        <div id="cardDisplay" class="card" onclick="drawCard()">
            <div class="card-meta" id="cardCategory">CATEGORÍA</div>
            <div class="card-text" id="cardText">PREGUNTA</div>
            <div class="card-footer">Hacer clic para siguiente pregunta</div>
        </div>
    </div>

    <script>
        // Estructura de datos completa indexada por id de categoría
        const questionsData = {
            0: {
                name: "Ganchos Radicales",
                color: "var(--vino)",
                items: [
                    "¿Qué es lo primero que pensaron cuando se dieron cuenta de que estaban entrando en la menopausia?",
                    "Si pudieran resumir la menopausia en una sola palabra que no sea 'vejez', ¿cuál sería?",
                    "¿Cuál es el mito o mentira más grande que les contaron sobre dejar de sangrar?",
                    "¿Qué es lo más 'indomesticable' que han hecho desde que empezaron este proceso?",
                    "Una frase del manifiesto dice: 'Ni dócil, ni mansa, ni seca'. ¿Cuándo fue la última vez que se sintieron así?",
                    "¿Qué le dirían hoy a la industria farmacéutica que vende la menopausia como una enfermedad?",
                    "Por qué nos da tanto miedo envejecer a las mujeres?",
                    "¿Qué es lo más ridículo o condescendiente que les ha dicho un médico sobre sus síntomas?",
                    "¿Cuál es el tabú más difícil de romper cuando se habla de madurez femenina?",
                    "¿Por qué decidieron parir Sangre o no sangre?"
                ],
                pool: []
            },
            1: {
                name: "Experiencia y Miedos",
                color: "var(--burdeo)",
                items: [
                    "Gabi, desde tu experiencia en terapia, ¿cuál fue el miedo más profundo que tuviste que masticar sola respecto a sangrar o no sangrar?",
                    "Andrea, desde tu lugar, ¿cómo fue el momento exacto en que dijiste 'mi cuerpo está cambiando y no hay vuelta atrás'?",
                    "¿Qué extrañan de su cuerpo de los 20 o 30 años? Y siendo honestas, ¿qué es lo que agradecen haber dejado atrás?",
                    "¿Cómo fue su primera menstruación y cómo se conecta ese recuerdo con el momento en que la sangre cesó o empezó a cambiar?",
                    "¿Qué parte de su identidad sintieron que 'murió' cuando cambió su ritmo biológico?",
                    "¿Han sentido el miedo a volverse 'invisibles' para la sociedad? ¿Cómo lo combaten?",
                    "¿Cómo se viven los síntomas desde la aceptación y no desde la vergüenza?",
                    "¿Hubo algún momento en que se miraron al espejo y no se reconocieron? ¿Qué se dijeron?",
                    "¿Cuál ha sido el día más difícil a nivel físico o emocional en este último tiempo y cómo lo sostuvieron?",
                    "¿Qué ritual, hábito o espacio sagrado crearon para ustedes mismas para atravesar este desierto?"
                ],
                pool: []
            },
            2: {
                name: "Psique y Cuerpo",
                color: "var(--terracota)",
                items: [
                    "El proyecto habla de 'cambiar el diván por la cueva'. ¿Qué se encuentra en la cueva que no se encuentra en una terapia tradicional?",
                    "¿Cómo se cruzan el psicoanálisis y la Gestalt para entender que la menopausia es un rito de pasaje y no un declive?",
                    "¿Por qué la psicología tradicional a veces falla en acompañar a las mujeres en el climaterio?",
                    "¿Cómo se transforma un síntoma físico (como el insomnio o la sequedad) en un 'símbolo' o un portal de autoconocimiento?",
                    "¿Qué significa, a nivel psicológico, 're-parirse a una misma' a los 50 años?",
                    "La sociedad dice que la menopausia es 'el fin de la fertilidad'. ¿De qué otras maneras nos volvemos fértiles ahora?",
                    "¿Qué memoria guarda nuestra sangre que la ciencia prefiere ignorar?",
                    "¿Cómo afecta el cambio hormonal a la psique femenina? ¿Nos volvemos locas o nos volvemos libres?",
                    "¿Qué herramientas somáticas o corporales recomiendan para cuando la mente se abruma con los cambios físicos?",
                    "¿Por qué es vital que integremos nuestra sombra y dancemos con ella en esta etapa de la vida?"
                ],
                pool: []
            },
            3: {
                name: "Erotismo y Deseo",
                color: "var(--rojo-oscuro)",
                items: [
                    "Una frase potente de los slogans es 'Menos flujo hormonal, más deseo carnal'. ¿Cómo se explica eso?",
                    "¿Cómo se redefine el erotismo cuando el cuerpo ya no responde a los estándares comerciales de la juventud?",
                    "¿Qué pasa con el deseo sexual en la menopausia? ¿Se apaga o se transforma?",
                    "¿Cómo se vuelve a habitar el cuerpo de manera sensual cuando se siente 'raro' o incómodo?",
                    "¿Qué le dirían a una mujer que cree que su vida sexual terminó porque ya no menstrúa?",
                    "¿Cómo es el 'Eros' propio, ese placer que no busca validar a nadie más, sino conectar con una misma?",
                    "¿Qué papel juega la lubricación, el tacto y el autodescubrimiento en esta nueva cartografía del cuerpo?",
                    "¿Por qué el placer femenino en la madurez sigue siendo un territorio tan censurado?",
                    "¿Cómo cambia la relación con la pareja (si la hay) cuando una mujer reclama la soberanía de su cuerpo?",
                    "¿Qué significa para ustedes 'sensualidad sin reglas'?"
                ],
                pool: []
            },
            5: {
                name: "Comunidad y Rebelión",
                color: "var(--ocre)",
                items: [
                    "¿Por qué dicen que este no es un retiro de descanso, sino un espacio para 'sacar la garra y la voz'?",
                    "¿Cómo sana ver a otra mujer de tu misma edad rugir, quejarse o celebrar su cuerpo sin eufemismos?",
                    "¿Qué le dirían a la mujer que está escuchando esto sola en su casa, sintiéndose incomprendida por su entorno?",
                    "¿Cómo se quema el guion que nosotras no escribimos sobre la vejez femenina?",
                    "¿Cuál es el legado o la huella que quieren dejar con la comunidad de Sangre o no sangre?",
                    "¿Qué significa 'volver al barro y reclamar el fuego'?",
                    "Si su comunidad fuera una revolución, ¿cuál sería la primera ley que abolirían?",
                    "¿Por qué la madurez es el campo más fructífero y fértil de la existencia de una mujer?",
                    "Para cerrar el capítulo: ¿Qué es lo que se viene para quienes decidan entrar a este umbral con ustedes?",
                    "Si tuvieran que dejarle un mensaje crudo, honesto y salvaje a la audiencia hoy, ¿cuál sería?"
                ],
                pool: []
            }
        };

        let currentCategory = null;

        // Inicializar los pools dinámicos duplicando los elementos fijos
        function initPools() {
            Object.keys(questionsData).forEach(catId => {
                questionsData[catId].pool = [...questionsData[catId].items];
                updateCounterDisplay(catId);
            });
        }

        function updateCounterDisplay(catId) {
            const countEl = document.getElementById(`count-${catId}`);
            if (countEl) {
                countEl.innerText = questionsData[catId].pool.length;
            }
        }

        function selectCategory(catId) {
            currentCategory = catId;
            
            // Gestionar clases activas visuales en botones
            const buttons = document.querySelectorAll('.deck-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Buscar el botón correspondiente por su evento onClick
            const activeBtn = Array.from(buttons).find(btn => btn.getAttribute('onclick').includes(`(${catId})`));
            if (activeBtn) activeBtn.classList.add('active');

            // Ocultar placeholder inicial
            document.getElementById('placeholder').style.display = 'none';

            // Resetear animación y lanzar primera carta
            const cardEl = document.getElementById('cardDisplay');
            cardEl.classList.remove('show', 'slide-out');
            
            setTimeout(() => {
                drawCard();
            }, 150);
        }

        function drawCard() {
            if (currentCategory === null) return;

            const category = questionsData[currentCategory];
            const cardEl = document.getElementById('cardDisplay');

            // Si el mazo se vacía, volverlo a rellenar automáticamente
            if (category.pool.length === 0) {
                category.pool = [...category.items];
                alert(`Mazo "${category.name}" rebarajado.`);
            }

            // Animación de salida si ya había una carta visible
            if (cardEl.classList.contains('show')) {
                cardEl.classList.add('slide-out');
                setTimeout(() => {
                    executeCardDraw(category, cardEl);
                }, 400);
            } else {
                executeCardDraw(category, cardEl);
            }
        }

        function executeCardDraw(category, cardEl) {
            // Extraer un índice aleatorio
            const randomIndex = Math.floor(Math.random() * category.pool.length);
            const questionText = category.pool.splice(randomIndex, 1)[0];

            // Actualizar interfaz interna
            document.getElementById('cardCategory').innerText = category.name;
            document.getElementById('cardText').innerText = questionText;
            updateCounterDisplay(currentCategory);

            // Cambiar estados de animación para revelar la nueva carta
            cardEl.classList.remove('slide-out');
            cardEl.style.display = 'flex';
            
            // Pequeño reflow hack para activar transición CSS
            void cardEl.offsetWidth; 
            cardEl.classList.add('show');
        }

        // Arrancar la aplicación al cargar la ventana
        window.onload = initPools;
    </script>
</body>
</html>
